<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Library</title>
  </head>
  <body>
    <h1>My Library</h1>
    {%if not bookme%}
    <P>LIBRARY IS EMPTY</P>
    {%endif%}
    <ul>
      {%for bookme in books %}
      <li>{{bookme.title}} || {{bookme.author}}  || {{bookme.rating}}</li>
      {%endfor%}
    </ul>

    <a href="{{url_for('addme')}}">Add New Book</a>
  </body>  
</html>
